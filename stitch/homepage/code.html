<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Common Credits - Cinematic Discovery</title>

                        "surface-variant": "#353534",
                        "on-surface-variant": "#e9bcb6",

                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .cinematic-gradient {
            background: linear-gradient(180deg, rgba(19,19,19,0) 0%, rgba(19,19,19,1) 100%);
        }
        .spotlight-fade {
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }
        .glass-panel {
            background: rgba(53, 53, 52, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(94, 63, 59, 0.1);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">

    
<!-- Hero Section -->
<main class="relative min-h-[90vh] flex flex-col items-center justify-center pt-16 overflow-hidden">
<!-- Background Imagery -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-30 grayscale scale-105" data-alt="Cinematic wide shot of a classic cinema theater interior" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBeKv7bPQVI9eDplvNU7Q_XCECYRTr8g7igm9fEgwYKyKEOXQ05Scsrj9fz59lov4JtmyVXfvRYbrEN0YBL__GZ0SDrwd5FhytlBbp3enNmXlpnIknwyAJxsdLkwURL8tmTDEO0t4cZp9DxITJAH4tppaoiEo6J7jozr9L4EtHZ_isD2Qha88gJ8FDr21t-Cweaq7h8AuB44NNyLEpmxAc_GzoY2gZZAeY9vG4oF8rTdgyiBokez3kqZ0dukM3byDGEu8DN5nDS6wlO"/>
<div class="absolute inset-0 cinematic-gradient"></div>
</div>
<!-- Content Overlay -->
<div class="relative z-10 w-full max-w-4xl px-6 text-center space-y-12">
<div class="space-y-4">
<h1 class="text-6xl md:text-8xl font-black tracking-tighter text-on-surface leading-tight">
                    DECODE THE <span class="text-primary">CONNECTION</span>
</h1>
<p class="text-lg md:text-xl text-on-surface-variant max-w-2xl mx-auto font-light leading-relaxed">
                    Uncover every shared cinematic moment between your favorite stars. From cult classics to modern blockbusters.
                </p>
</div>
<!-- Input Interface -->
<div class="glass-panel p-2 md:p-4 rounded-xl shadow-2xl space-y-4 md:space-y-0 md:flex items-center gap-4">
<div class="flex-1 relative group">
<label class="absolute -top-2 left-4 px-1 bg-surface-container text-[10px] uppercase tracking-widest text-primary font-bold rounded">Actor 1</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg px-5 py-4 text-on-surface focus:ring-1 focus:ring-primary placeholder:text-on-surface-variant/30" placeholder="Enter actor name..." type="text"/>
</div>
<div class="flex justify-center items-center">
<span class="material-symbols-outlined text-secondary opacity-50 text-3xl">unfold_more</span>
</div>
<div class="flex-1 relative group">
<label class="absolute -top-2 left-4 px-1 bg-surface-container text-[10px] uppercase tracking-widest text-primary font-bold rounded">Actor 2</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg px-5 py-4 text-on-surface focus:ring-1 focus:ring-primary placeholder:text-on-surface-variant/30" placeholder="Enter actor name..." type="text"/>
</div>
<button class="w-full md:w-auto bg-gradient-to-br from-primary to-primary-container text-on-primary-container px-8 py-4 rounded-lg font-bold text-sm tracking-wide hover:scale-[1.02] transition-transform active:scale-95 flex items-center justify-center gap-2">
                    FIND SHARED CREDITS
                    <span class="material-symbols-outlined">movie_filter</span>
</button>
</div>
</div>
</main>

<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
